<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Guess the Number(1-10)</h2>
    <input type="number" id="guess" placeholder="Enter number">
    <button id="btn">Check</button>
    <p id="result"></p>
    <script>
        const randomNum=Math.floor(Math.random()*10)+1;
        const checkGuess=()=>{
            const userGuess=parseInt(document.getElementById("guess").value);if(userGuess===randomNum){ document.getElementById("result").innerHTML="💕Congratulations! You guessed the number."; }else if(userGuess<randomNum){ document.getElementById("result").innerHTML="Too low! Try again."; }else{ document.getElementById("result").innerHTML="Too high! Try again."; } }; document.getElementById("btn").addEventListener("click",checkGuess);
    </script>
</body>
</html>
