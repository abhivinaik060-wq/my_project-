<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="counter()">Click Counter</button>
    <script>
        function outer(){
            let count=0;
            return function inner(){
                count++;
                alert("Count="+count);
            ;}

        }
        const counter=outer();
    </script>
</body>
</html>
