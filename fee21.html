<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Open Console to see output</h3>
    <script>
        let x=10;
        function showA(){
            let a=5;
            console.log("Function Declaration:a=",a);
        }
        const showB=function(){
            let b=15;
            console.log("Function Expression:b=",b);
        }
        const showC=()=>{
            let c=20;
            console.log("Arrow Function:c=",c);
        }
        showA();
        showB();
        showC();
    </script>
</body>
</html>
