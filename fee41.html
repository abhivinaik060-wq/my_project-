<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Slider</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(45deg,#667eea,#764ba2);
    color: white;
}

.card {
    background: white;
    color: black;
    width: 400px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 6px 10px rgba(0,0,0,0.1);
    font-size: 18px;
    transition: 0.5s;
}

button{
    padding:8px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#fff;
}
</style>
</head>
<body>

<h2>Motivational Quote Slider</h2>

<button onclick="filterQuotes('All')">All</button>
<button onclick="filterQuotes('Success')">Success</button>
<button onclick="filterQuotes('Study')">Study</button>

<div id="output"></div>

<script>
const quotes = [
    {text:"Success is not final, failure is not fatal.", category:"Success"},
    {text:"Study hard and never give up.", category:"Study"},
    {text:"Believe in yourself and all that you are.", category:"Success"},
    {text:"Education is the most powerful weapon which you can use to change the world.", category:"Study"},
    {text:"The only way to do great work is to love what you do.", category:"Success"}
];

let filteredQuotes = quotes;
let index = 0;
let timer;

// filter quotes
function filterQuotes(type){
    if(type === "All"){
        filteredQuotes = quotes;
    } else {
        filteredQuotes = quotes.filter(q => q.category === type);
    }
    index = 0;
    showQuote();
}

// display quote
function showQuote(){
    clearTimeout(timer);

    if(filteredQuotes.length === 0) return;

    document.getElementById("output").innerHTML =
        `<div class="card">
            ${filteredQuotes[index].text}
            <br><small>${filteredQuotes[index].category}</small>
        </div>`;

    index = (index + 1) % filteredQuotes.length;

    timer = setTimeout(showQuote, 3000);
}

// show first quote
showQuote();
</script>

</body>
</html>
