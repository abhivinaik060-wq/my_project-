<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Digital Clock</h2>
    <h1 id="clock"></h1>
    <script>
        setInterval(showTime,1000);
        function showTime(){
            let time=new Date();
            document.getElementById("clock").innerHTML=
            time.toLocaleTimeString();
        }
    </script>
</body>
</html>
