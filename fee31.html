<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Recursive Function example.</h3>
    <button onclick="calculate()">Find Factorial</button>
    <p id="result"></p>
    <script>
        function factorial(n){
            if(n===1){
                return 1;
            }
            return n*factorial(n -1);
        }
        function calculate(){
            let num=5;
            document.getElementById("result").innerHTML="Factorial of "+num+" is: "+factorial(num);
        }
    </script>
</body>
</html>
